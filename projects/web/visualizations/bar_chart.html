<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>United States GDP Visualization</title>
  <link rel="icon" href="../../../favicon.svg" type="image/svg+xml">
  <script src="viz-shell.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="viz-shell.css">
  <style>
    .bar {
      fill: url(#barGradient);
    }

    .bar:hover {
      filter: brightness(1.45) saturate(1.15);
    }

    .bar-gradient-top {
      stop-color: var(--cyan);
    }

    .bar-gradient-bottom {
      stop-color: var(--accent);
    }

    .grid line {
      stroke: var(--grid);
      shape-rendering: crispEdges;
    }

    .grid path {
      stroke-width: 0;
    }

    .tick text {
      font-size: 12px;
    }

    .axis-label {
      font-size: 13px;
      fill: var(--muted-soft);
    }

    .baseline {
      stroke: var(--axis);
      stroke-width: 1.5;
    }
  </style>
</head>

<body class="viz-page">
  <div class="viz-panel">
    <p class="viz-kicker">D3.js · Time Series</p>
    <h1 id="title" class="viz-title">United States GDP Growth</h1>
    <p class="viz-sub">Quarterly gross domestic product, 1947 to 2015. Hover any bar for its exact quarter and value.</p>
    <div id="tooltip" class="viz-tooltip" data-date=""></div>
    <div id="chart-area"></div>
  </div>

  <script>
    const width = 800;
    const height = 500;
    const margin = { top: 40, right: 40, bottom: 60, left: 80 };
    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const svgRoot = d3.select("#chart-area")
      .append("svg")
      .attr("width", "100%")
      .attr("height", "100%")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMidYMid meet");

    const gradient = svgRoot.append("defs")
      .append("linearGradient")
      .attr("id", "barGradient")
      .attr("x1", "0").attr("y1", "0")
      .attr("x2", "0").attr("y2", "1");
    gradient.append("stop").attr("class", "bar-gradient-top").attr("offset", "0%");
    gradient.append("stop").attr("class", "bar-gradient-bottom").attr("offset", "100%");

    const svg = svgRoot.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    // Local copy first; the original source stays as a fallback so the chart
    // still works if the file is ever missing.
    d3.json("data/gdp.json")
      .catch(() => d3.json("https://raw.githubusercontent.com/freeCodeCamp/ProjectReferenceData/master/GDP-data.json"))
      .then(data => {
        const dataset = data.data;

        const xExtent = d3.extent(dataset, d => new Date(d[0]));
        const xScale = d3.scaleTime()
          .domain(xExtent)
          .range([0, innerW]);

        const yScale = d3.scaleLinear()
          .domain([0, d3.max(dataset, d => d[1])])
          .range([innerH, 0]);

        svg.append("g")
          .attr("class", "grid")
          .call(d3.axisLeft(yScale).ticks(6).tickSize(-innerW).tickFormat(""));

        const xAxis = d3.axisBottom(xScale).ticks(10);
        svg.append("g")
          .attr("id", "x-axis")
          .attr("transform", `translate(0, ${innerH})`)
          .call(xAxis);

        const yAxis = d3.axisLeft(yScale);
        svg.append("g")
          .attr("id", "y-axis")
          .call(yAxis);

        svg.append("text")
          .attr("transform", "rotate(-90)")
          .attr("y", -60)
          .attr("x", -innerH / 2)
          .attr("class", "axis-label")
          .style("text-anchor", "middle")
          .text("Gross Domestic Product (Billions)");

        const barWidth = innerW / dataset.length;

        const tooltip = d3.select("#tooltip");

        const bars = svg.selectAll(".bar")
          .data(dataset)
          .enter()
          .append("rect")
          .attr("class", "bar")
          .attr("data-date", d => d[0])
          .attr("data-gdp", d => d[1])
          .attr("x", (d, i) => i * barWidth)
          .attr("y", innerH)
          .attr("width", barWidth)
          .attr("height", 0)
          .on("mouseover", (event, d) => {
            const date = new Date(d[0]);
            const year = date.getFullYear();
            const quarter = Math.floor(date.getMonth() / 3) + 1;

            tooltip.transition().duration(100).style("opacity", 1);
            tooltip.html(`${year} Q${quarter}<br>$${d[1].toLocaleString()} Billion`)
              .style("left", (event.pageX + 15) + "px")
              .style("top", (event.pageY - 40) + "px")
              .attr("data-date", d[0]);
          })
          .on("mouseout", () => {
            tooltip.transition().duration(400).style("opacity", 0);
          });

        const baseline = svg.append("line")
          .attr("class", "baseline")
          .attr("y1", innerH)
          .attr("y2", innerH)
          .attr("x1", 0)
          .attr("x2", 0);

        // Entrance waits until the pane is actually on screen (frames preload
        // far ahead of the viewport), then bars rise left to right.
        window.vizShell.whenVisible(document.getElementById("chart-area"), skip => {
          if (skip) {
            bars.attr("y", d => yScale(d[1])).attr("height", d => innerH - yScale(d[1]));
            baseline.attr("x2", innerW);
            return;
          }
          baseline.transition()
            .duration(700)
            .ease(d3.easeCubicOut)
            .attr("x2", innerW);
          bars.transition()
            .duration(900)
            .ease(d3.easeCubicOut)
            .delay((d, i) => i * 3)
            .attr("y", d => yScale(d[1]))
            .attr("height", d => innerH - yScale(d[1]));
        });
      })
      .catch(error => console.error("Error loading the data: ", error));
  </script>
</body>

</html>
