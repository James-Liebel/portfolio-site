<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treemap Visualization Dashboard</title>
  <link rel="icon" href="../../../favicon.svg" type="image/svg+xml">
  <script src="viz-shell.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="viz-shell.css">
  <style>
    body.viz-page {
      justify-content: flex-start;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      justify-content: center;
    }

    .btn {
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--text);
      font: 700 11px/1 "Space Mono", monospace;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: var(--cyan);
    }

    .btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chart-container {
      position: relative;
      width: 100%;
      max-width: 1100px;
      box-sizing: border-box;
      padding: 20px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--border-soft);
    }

    :root[data-embed="true"] .chart-container {
      padding: 8px 0 0;
      border: 0;
      background: transparent;
    }

    .tile {
      stroke: var(--bg);
      stroke-width: 1px;
      transition: opacity 0.2s;
      cursor: pointer;
    }

    .tile:hover {
      opacity: 0.82;
    }

    .tile-text {
      font-size: 10px;
      fill: #fff;
      pointer-events: none;
      font-weight: 500;
      paint-order: stroke;
      stroke: rgba(0, 0, 0, 0.45);
      stroke-width: 1.6px;
    }

    #legend {
      margin-top: 20px;
    }

    #legend text {
      font-size: 11px;
      fill: var(--muted);
    }
  </style>
</head>

<body class="viz-page">
  <div class="header">
    <p class="viz-kicker">D3.js · Hierarchical Data</p>
    <h1 id="title" class="viz-title">Hierarchical Data Explorer</h1>
    <p id="description" class="viz-sub">Explore different datasets using interactive treemap layouts</p>
  </div>

  <div class="controls">
    <button class="btn active" onclick="loadData('videogames')">Video Games</button>
    <button class="btn" onclick="loadData('movies')">Movies</button>
    <button class="btn" onclick="loadData('kickstarter')">Kickstarter</button>
  </div>

  <div class="chart-container">
    <div id="tooltip" class="viz-tooltip"></div>
    <div id="chart"></div>
    <div id="legend"></div>
  </div>

  <script>
    // Escape dataset-sourced strings before they reach d3's .html() (innerHTML) sink.
    const esc = (value) => String(value).replace(/[&<>"']/g, (ch) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]
    ));

    const DATASETS = {
      videogames: {
        title: "Video Game Sales",
        description: "Top 100 Most Sold Video Games Grouped by Platform",
        url: "data/video-game-sales.json",
        fallback: "https://cdn.freecodecamp.org/testable-projects-fcc/data/tree_map/video-game-sales-data.json"
      },
      movies: {
        title: "Movie Sales",
        description: "Top 95 Highest Grossing Movies Grouped by Genre",
        url: "data/movies.json",
        fallback: "https://cdn.freecodecamp.org/testable-projects-fcc/data/tree_map/movie-data.json"
      },
      kickstarter: {
        title: "Kickstarter Pledges",
        description: "Top 100 Most Pledged Kickstarter Campaigns Grouped by Category",
        url: "data/kickstarter.json",
        fallback: "https://cdn.freecodecamp.org/testable-projects-fcc/data/tree_map/kickstarter-funding-data.json"
      }
    };

    const width = 1000;
    const height = 650;
    const color = d3.scaleOrdinal(d3.schemeTableau10);

    // First render holds the tile cascade until the pane is on screen; dataset
    // switches afterwards replay it immediately.
    let revealed = false;
    let pendingReveal = null;
    window.vizShell.whenVisible(document.querySelector(".chart-container"), skip => {
      revealed = true;
      if (pendingReveal) {
        const run = pendingReveal;
        pendingReveal = null;
        run(skip);
      }
    });

    function loadData(id) {
      d3.select("#chart").html("");
      d3.select("#legend").html("");

      // Update UI
      d3.selectAll(".btn").classed("active", false);
      d3.select(`.btn[onclick*='${id}']`).classed("active", true);

      const config = DATASETS[id];
      d3.select("#title").text(config.title);
      d3.select("#description").text(config.description);

      d3.json(config.url).catch(() => d3.json(config.fallback)).then(data => {
        const svg = d3.select("#chart")
          .append("svg")
          .attr("width", "100%")
          .attr("height", "100%")
          .attr("viewBox", `0 0 ${width} ${height}`)
          .attr("preserveAspectRatio", "xMidYMid meet");

        const root = d3.hierarchy(data)
          .eachBefore(d => d.data.id = (d.parent ? d.parent.data.id + "." : "") + d.data.name)
          .sum(d => d.value)
          .sort((a, b) => b.value - a.value);

        d3.treemap()
          .size([width, height])
          .paddingInner(1)
          (root);

        const tooltip = d3.select("#tooltip");

        const cell = svg.selectAll("g")
          .data(root.leaves())
          .enter().append("g")
          .attr("transform", d => `translate(${d.x0},${d.y0})`);

        const tiles = cell.append("rect")
          .attr("id", d => d.data.id)
          .attr("class", "tile")
          .attr("width", d => d.x1 - d.x0)
          .attr("height", 0)
          .attr("fill", d => color(d.data.category))
          .attr("data-name", d => d.data.name)
          .attr("data-category", d => d.data.category)
          .attr("data-value", d => d.data.value)
          .on("mouseover", (event, d) => {
            tooltip.transition().duration(100).style("opacity", 1);
            tooltip.html(`
                            <strong>${esc(d.data.name)}</strong><br/>
                            Category: ${esc(d.data.category)}<br/>
                            Value: ${d.data.value.toLocaleString()}
                        `)
              .style("left", (event.pageX + 20) + "px")
              .style("top", (event.pageY - 40) + "px");
          })
          .on("mouseout", () => {
            tooltip.transition().duration(300).style("opacity", 0);
          });

        const labels = cell.append("text")
          .attr("class", "tile-text")
          .attr("opacity", 0);

        labels.selectAll("tspan")
          .data(d => d.data.name.split(/(?=[A-Z][^A-Z])/g))
          .enter().append("tspan")
          .attr("x", 4)
          .attr("y", (d, i) => 13 + i * 10)
          .text(d => d);

        const reveal = skip => {
          if (skip) {
            tiles.attr("height", d => d.y1 - d.y0);
            labels.attr("opacity", 1);
            return;
          }
          tiles.transition()
            .duration(750)
            .ease(d3.easeCubicOut)
            .delay((d, i) => i * 4)
            .attr("height", d => d.y1 - d.y0);
          labels.transition()
            .duration(600)
            .delay(450)
            .attr("opacity", 1);
        };

        if (revealed) reveal(window.vizShell.reducedMotion);
        else pendingReveal = reveal;

        // Legend
        const categories = root.leaves().map(nodes => nodes.data.category);
        const uniqueCategories = categories.filter((category, index, self) => self.indexOf(category) === index);

        const legendSvg = d3.select("#legend")
          .append("svg")
          .attr("width", "100%")
          .attr("height", "100%")
          .attr("viewBox", `0 0 ${width} 100`)
          .attr("preserveAspectRatio", "xMidYMid meet");

        const legendItems = legendSvg.selectAll("g")
          .data(uniqueCategories)
          .enter().append("g")
          .attr("transform", (d, i) => `translate(${(i % 6) * 160}, ${Math.floor(i / 6) * 25})`);

        legendItems.append("rect")
          .attr("width", 15)
          .attr("height", 15)
          .attr("fill", d => color(d))
          .attr("rx", 3);

        legendItems.append("text")
          .attr("x", 20)
          .attr("y", 12)
          .text(d => d);
      });
    }

    // Initial load
    loadData('videogames');
  </script>
</body>

</html>
