<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycling Doping Analysis</title>
  <link rel="icon" href="../../../favicon.svg" type="image/svg+xml">
  <script src="viz-shell.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="viz-shell.css">
  <style>
    .dot {
      stroke: var(--bg);
      stroke-width: 1.5;
      transition: r 0.3s, fill 0.3s;
      cursor: pointer;
    }

    .dot:hover {
      r: 10 !important;
    }

    .dot--clean {
      fill: rgba(52, 211, 153, 0.85);
    }

    .dot--doping {
      fill: rgba(248, 113, 113, 0.85);
    }

    .grid line {
      stroke: var(--grid);
      shape-rendering: crispEdges;
    }

    .grid path {
      stroke-width: 0;
    }

    .legend-item {
      font-size: 12px;
      fill: var(--muted);
    }

    .tick text {
      font-size: 11px;
    }
  </style>
</head>

<body class="viz-page">
  <div class="viz-panel">
    <p class="viz-kicker">D3.js · Scatter Plot</p>
    <h1 id="title" class="viz-title">Doping in Professional Cycling</h1>
    <p id="subtitle" class="viz-sub">35 fastest times up Alpe d'Huez, with doping allegations flagged in red.</p>
    <div id="tooltip" class="viz-tooltip"></div>
    <div id="chart"></div>
  </div>

  <script>
    // Escape dataset-sourced strings before they reach d3's .html() (innerHTML) sink.
    const esc = (value) => String(value).replace(/[&<>"']/g, (ch) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]
    ));

    const width = 850;
    const height = 550;
    const margin = { top: 20, right: 100, bottom: 60, left: 80 };
    const innerW = width - margin.left - margin.right;
    const innerH = height - margin.top - margin.bottom;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("width", "100%")
      .attr("height", "100%")
      .attr("viewBox", `0 0 ${width} ${height}`)
      .attr("preserveAspectRatio", "xMidYMid meet")
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    d3.json("data/cyclist.json")
      .catch(() => d3.json("https://raw.githubusercontent.com/freeCodeCamp/ProjectReferenceData/master/cyclist-data.json"))
      .then(data => {
        const parseTime = d3.timeParse("%M:%S");
        data.forEach(d => {
          d.TimeDate = parseTime(d.Time);
        });

        const xScale = d3.scaleLinear()
          .domain([d3.min(data, d => d.Year - 1), d3.max(data, d => d.Year + 1)])
          .range([0, innerW]);

        const yScale = d3.scaleTime()
          .domain(d3.extent(data, d => d.TimeDate))
          .range([0, innerH]);

        svg.append("g")
          .attr("class", "grid")
          .call(d3.axisLeft(yScale).ticks(8).tickSize(-innerW).tickFormat(""));

        const xAxis = d3.axisBottom(xScale).tickFormat(d3.format("d"));
        svg.append("g")
          .attr("id", "x-axis")
          .attr("transform", `translate(0, ${innerH})`)
          .call(xAxis);

        const yAxis = d3.axisLeft(yScale).tickFormat(d3.timeFormat("%M:%S"));
        svg.append("g")
          .attr("id", "y-axis")
          .call(yAxis);

        const tooltip = d3.select("#tooltip");

        const dots = svg.selectAll(".dot")
          .data(data)
          .enter()
          .append("circle")
          .attr("class", d => "dot " + (d.Doping ? "dot--doping" : "dot--clean"))
          .attr("cx", d => xScale(d.Year))
          .attr("cy", d => yScale(d.TimeDate))
          .attr("r", 0)
          .on("mouseover", (event, d) => {
            tooltip.transition().duration(200).style("opacity", 1);
            tooltip.html(`
                            <strong>${esc(d.Name)}: ${esc(d.Nationality)}</strong><br/>
                            Year: ${esc(d.Year)}, Time: ${esc(d.Time)}<br/>
                            ${d.Doping ? '<br/>' + esc(d.Doping) : 'No doping allegations'}
                        `)
              .style("left", (event.pageX + 20) + "px")
              .style("top", (event.pageY - 40) + "px");
          })
          .on("mouseout", () => {
            tooltip.transition().duration(500).style("opacity", 0);
          });

        // Legend sits inside the plot's empty top-right corner so labels never
        // clip against the viewBox edge.
        const legend = svg.append("g")
          .attr("id", "legend")
          .attr("transform", `translate(${innerW - 165}, 14)`);

        const categories = [
          { label: "No allegations", color: "rgba(52, 211, 153, 0.85)" },
          { label: "Doping allegations", color: "rgba(248, 113, 113, 0.85)" }
        ];

        categories.forEach((cat, i) => {
          const row = legend.append("g").attr("transform", `translate(0, ${i * 25})`);
          row.append("rect")
            .attr("width", 15)
            .attr("height", 15)
            .attr("fill", cat.color)
            .attr("rx", 4);
          row.append("text")
            .attr("x", 20)
            .attr("y", 12)
            .attr("class", "legend-item")
            .text(cat.label);
        });

        // Dots pop in chronologically once the pane is actually on screen.
        window.vizShell.whenVisible(document.getElementById("chart"), skip => {
          if (skip) {
            dots.attr("r", 7);
            return;
          }
          dots.sort((a, b) => a.Year - b.Year)
            .transition()
            .duration(600)
            .ease(d3.easeBackOut.overshoot(2.2))
            .delay((d, i) => i * 28)
            .attr("r", 7);
        });
      });
  </script>
</body>

</html>
